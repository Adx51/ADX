name: "ADX — Cave à vin"
version: "0.1.4"
slug: adx_cellar
description: "Gestion de cave à vin premium propulsée par l'IA (web + API + PostgreSQL/pgvector)"
url: "https://github.com/Adx51/ADX"
# Prebuilt image pulled from GHCR (HA appends -{arch} and the version tag).
# Remove this line to build from source locally instead (uses ./Dockerfile).
image: "ghcr.io/adx51/adx-cellar-{arch}"
# armv7/armhf are not built by the PostgreSQL apt repository, so only 64-bit archs.
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: manual
# Only the web UI is exposed; it proxies /api/* to the API internally.
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Interface web ADX"
webui: "http://[HOST]:[PORT:3000]"
options:
  ai_provider: openai
  openai_api_key: ""
  ai_model: ""
  ai_vision_model: ""
  jwt_secret: ""
  seed_demo_data: false
schema:
  ai_provider: "list(openai|gemini)"
  openai_api_key: "password?"
  ai_model: "str?"
  ai_vision_model: "str?"
  jwt_secret: "password?"
  seed_demo_data: "bool?"
