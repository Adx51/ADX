name: Build add-on image

# Publishes the Home Assistant add-on image to GHCR, one image per architecture
# (adx-cellar-amd64 / adx-cellar-aarch64), tagged with the add-on version.
#
# Triggers: manually (Actions → "Build add-on image" → Run workflow), on a tag
# like v0.1.0, or on a push to a release branch that touches the app/add-on.
# The image tag comes from `version:` in adx-cellar/config.yaml, not the git ref.
# After the first run, make the GHCR packages public so Home Assistant can pull
# them anonymously (see adx-cellar/DOCS.md).

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/wine-cellar-app-tl4zvr
    tags:
      - 'v*'
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker/**'
      - 'adx-cellar/**'
      - '.github/workflows/addon-image.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Each architecture builds on a native runner (no QEMU emulation) → fast,
    # reliable builds and a much smaller window where a new version is advertised
    # before its image exists.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name and version
        id: meta
        run: |
          VERSION=$(grep '^version:' adx-cellar/config.yaml | head -1 | cut -d'"' -f2)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER/adx-cellar-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/addon.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
