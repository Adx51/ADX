name: Build add-on image

# Publishes the Home Assistant add-on image to GHCR, one image per architecture
# (adx-cellar-amd64 / adx-cellar-aarch64), tagged with the add-on version.
#
# Run it manually (Actions → "Build add-on image" → Run workflow) or by pushing
# a tag like v0.1.0. After the first run, make the GHCR packages public so Home
# Assistant can pull them anonymously (see adx-cellar/DOCS.md).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name and version
        id: meta
        run: |
          VERSION=$(grep '^version:' adx-cellar/config.yaml | head -1 | cut -d'"' -f2)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER/adx-cellar-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      # QEMU lets the amd64 runner build the arm64 image. Native arm runners
      # (runs-on: ubuntu-24.04-arm) would be faster if available to you.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/addon.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
